# Build and deploy the Vite + React + Tailwind site to GitHub Pages
# on every push to the `main` branch.
#
# After first push:
#   1. Go to repo Settings -> Pages
#   2. Under "Build and deployment", set Source = "GitHub Actions"
#   3. (Optional) Add a custom domain — see README.md

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual triggering from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Opt all JavaScript-based actions into Node.js 24 (Node 20 is deprecated
# on GitHub-hosted runners as of 2025-09; mandatory by 2026-06).
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # current LTS — the version used to build the site
          cache: npm

      - name: Install dependencies
        # We use `npm install` (not `npm ci`) because of a long-standing npm bug
        # where platform-specific optional dependencies (Rollup's native binaries)
        # don't resolve correctly when the lockfile was generated on a different
        # OS than the CI runner. See: https://github.com/npm/cli/issues/4828
        # `npm install` re-resolves and picks the correct Linux binary for Vite.
        run: npm install --no-audit --no-fund

      - name: Build
        env:
          # When deploying to https://<user>.github.io/<repo>/ the bundled
          # asset paths need to be prefixed with /<repo>/. The repository
          # name is exposed as $GITHUB_REPOSITORY (e.g. "user/repo").
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Add SPA 404 fallback
        # GitHub Pages doesn't know about React Router routes. Copying
        # index.html to 404.html makes deep links (e.g. /about) work on
        # page-refresh by serving the SPA shell.
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
