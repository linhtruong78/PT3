# Netlify config — alternative one-click hosting for this Vite site.
#
# To use Netlify instead of GitHub Pages:
#   1. Sign in at https://app.netlify.com with GitHub
#   2. "Add new site" -> "Import an existing project" -> pick this repo
#   3. Build settings are auto-detected from this file.
#   4. (Optional) Add a custom domain in Site settings -> Domain management.

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — every unknown path serves index.html so React Router can
# handle it client-side.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
